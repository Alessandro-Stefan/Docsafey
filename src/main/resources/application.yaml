spring:
  application:
    name: docsafey

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME} 
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        ddl-auto: update
        order_inserts: true
        order_updates: true

  web:
    error:
      include-message: always