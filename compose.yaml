
services:
  postgres:
    image: postgres:17
    container_name: docsafey-postgres
    environment:
      POSTGRES_DB: docsafey
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docsafey"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: ["full"]        
    build:
      context: .
    container_name: docsafey-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docsafey
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data: