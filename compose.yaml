services:

  postgres:
    image: postgres:17

    container_name: postgres-db

    environment:
      POSTGRES_DB: docsafey 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123 

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .

    container_name: docsafey-app

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docsafey
      SPRING_DATASOURCE_USERNAME: postgres 
      SPRING_DATASOURCE_PASSWORD: admin123 

    depends_on:
      - postgres

volumes:
  postgres-data: